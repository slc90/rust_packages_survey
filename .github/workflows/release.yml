name: Release

on:
  push:
    tags:
      # 匹配 v1.0.0, v2.3.4 等格式的标签
      - "v[0-9]+\\.[0-9]+\\.[0-9]+"

env:
  CARGO_TERM_COLOR: never
  RUST_BACKTRACE: "full"
  RUSTFLAGS: "-Dwarnings"
  GSTREAMER_VERSION: "1.26.9"

jobs:
  verify:
    name: Verify Release
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: windows-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-registry-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install GStreamer runtime and development packages
        shell: pwsh
        run: |
          choco install gstreamer --version $env:GSTREAMER_VERSION -y
          choco install gstreamer-devel --version $env:GSTREAMER_VERSION -y

          $gstRoot = [Environment]::GetEnvironmentVariable("GSTREAMER_1_0_ROOT_MSVC_X86_64", "Machine")
          if (-not $gstRoot) {
            throw "GSTREAMER_1_0_ROOT_MSVC_X86_64 was not set by Chocolatey"
          }

          "$gstRoot\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "PKG_CONFIG_PATH=$gstRoot\lib\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "GSTREAMER_1_0_ROOT_MSVC_X86_64=$gstRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Verify formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets

      - name: Run tests
        run: cargo test --workspace --verbose

  build-installer:
    name: Build Windows Installer
    runs-on: windows-latest
    needs: verify
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install GStreamer runtime and development packages
        shell: pwsh
        run: |
          choco install gstreamer --version $env:GSTREAMER_VERSION -y
          choco install gstreamer-devel --version $env:GSTREAMER_VERSION -y

          $gstRoot = [Environment]::GetEnvironmentVariable("GSTREAMER_1_0_ROOT_MSVC_X86_64", "Machine")
          if (-not $gstRoot) {
            throw "GSTREAMER_1_0_ROOT_MSVC_X86_64 was not set by Chocolatey"
          }

          "$gstRoot\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "PKG_CONFIG_PATH=$gstRoot\lib\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "GSTREAMER_1_0_ROOT_MSVC_X86_64=$gstRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: windows-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-registry-

      - name: Extract version from tag
        id: extract_version
        shell: pwsh
        run: |
          $tagName = $env:GITHUB_REF -replace 'refs/tags/', ''
          $version = $tagName -replace '^v', ''
          "tag_name=$tagName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Download installer assets
        shell: pwsh
        run: |
          .\installer\scripts\fetch_release_assets.ps1 -WorkspaceRoot $PWD -Force

      - name: Install WiX
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 5.0.2
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build MSI
        shell: pwsh
        run: |
          $resolvedAssets = Get-Content -Raw .\installer\downloaded_assets\resolved_assets.json | ConvertFrom-Json
          .\installer\scripts\build_installer.ps1 `
            -WorkspaceRoot $PWD `
            -GStreamerRoot $resolvedAssets.gstreamer_runtime.layout.runtime_root_dir `
            -CudaBinRoot $resolvedAssets.cuda_runtime.layout.cuda_bin_dir `
            -WhisperBaseModelRoot $resolvedAssets.whisper_base_assets.layout.whisper_base_dir `
            -WhisperLargeV3ModelRoot $resolvedAssets.whisper_large_v3_assets.layout.whisper_large_v3_dir `
            -WhisperLargeV3PartsRoot (Join-Path $PWD 'installer\downloaded_assets\whisper_large_v3_assets\parts')

          $version = '${{ steps.extract_version.outputs.version }}'
          $sourceMsi = Join-Path $PWD 'installer\dist\rust_packages_survey.msi'
          if (-not (Test-Path $sourceMsi)) {
            throw "缺少 MSI 构建产物: $sourceMsi"
          }

          $versionedMsi = Join-Path $PWD "installer\dist\rust_packages_survey-$version.msi"
          Move-Item -LiteralPath $sourceMsi -Destination $versionedMsi -Force

      - name: Generate SHA256 sums
        shell: pwsh
        run: |
          $version = '${{ steps.extract_version.outputs.version }}'
          $files = Get-ChildItem -Path 'installer\dist' -Include '*.msi', '*.cab' -File | Sort-Object Name | Select-Object -ExpandProperty FullName
          $files += (Resolve-Path 'target\release\entry.exe').Path
          $hashLines = foreach ($file in $files) {
            $hash = (Get-FileHash -Path $file -Algorithm SHA256).Hash.ToLowerInvariant()
            "{0}  {1}" -f $hash, (Split-Path $file -Leaf)
          }
          $hashLines | Set-Content -Path 'installer\dist\SHA256SUMS.txt' -Encoding utf8

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: survey-release
          path: |
            installer/dist/*.msi
            installer/dist/*.cab
            installer/dist/SHA256SUMS.txt
            target/release/entry.exe
          retention-days: 7

  create-release:
    name: Create GitHub Release
    runs-on: windows-latest
    needs: build-installer
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v7
        with:
          name: survey-release
          path: ./artifacts

      - name: Inspect artifacts
        run: |
          echo "PWD:"
          pwd
          echo "Artifacts tree:"
          ls -R artifacts

      - name: Extract version from tag
        id: extract_version
        run: |
          $tagName = $env:GITHUB_REF -replace 'refs/tags/', ''
          $version = $tagName -replace '^v', ''
          echo "tag_name=$tagName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          echo "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release v${{ steps.extract_version.outputs.version }}
          tag_name: ${{ steps.extract_version.outputs.tag_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            artifacts/*.msi
            artifacts/*.cab
            artifacts/SHA256SUMS.txt
            artifacts/entry.exe
