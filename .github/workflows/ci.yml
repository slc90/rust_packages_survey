name: CI

on:
  push:
    branches:
      - "**"
    # 忽略所有 tag push
    tags-ignore:
      - "**"

env:
  # 用来控制终端输出是否使用颜色
  CARGO_TERM_COLOR: never
  RUST_BACKTRACE: "full"
  # Make sure CI fails on all warnings, including Clippy lints
  RUSTFLAGS: "-Dwarnings"
  GSTREAMER_VERSION: "1.26.9"

jobs:
  procedures:
    name: Procedures
    runs-on: windows-latest
    if: github.ref_type == 'branch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: windows-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-registry-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install GStreamer runtime and development packages
        shell: pwsh
        run: |
          choco install gstreamer --version $env:GSTREAMER_VERSION -y
          choco install gstreamer-devel --version $env:GSTREAMER_VERSION -y

          $gstRoot = [Environment]::GetEnvironmentVariable("GSTREAMER_1_0_ROOT_MSVC_X86_64", "Machine")
          if (-not $gstRoot) {
            throw "GSTREAMER_1_0_ROOT_MSVC_X86_64 was not set by Chocolatey"
          }

          "$gstRoot\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "PKG_CONFIG_PATH=$gstRoot\lib\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "GSTREAMER_1_0_ROOT_MSVC_X86_64=$gstRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: target
          key: windows-cargo-build-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: windows-cargo-build-

      - name: Check workspace compilation
        run: cargo check --workspace

      - name: Formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --workspace --all-targets

      - name: Test
        run: cargo test --workspace --verbose
